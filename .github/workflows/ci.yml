name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: g++ -std=c++17 -O2 -Wall -Wextra -Werror main.cpp -o course_allocator

      - name: Test
        run: ./course_allocator --self-test

      - name: Run sample allocation
        run: |
          ./course_allocator \
            --students data/students.csv \
            --courses data/courses.csv \
            --output allocations.csv
